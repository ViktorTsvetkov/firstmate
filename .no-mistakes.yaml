# Per-repo no-mistakes overrides.

# firstmate is an agent-orchestration repo: its AGENTS.md installs a fleet-captain
# identity. Disable project-level agent settings/instructions for gate agents so a
# no-mistakes review/fix/document/test/lint/pr/rebase/ci agent never adopts that
# identity or drives the fleet. Trusted-only: a pushed branch cannot turn this off,
# so it is honored only from the default-branch copy of this file. Layered above
# the NO_MISTAKES_GATE lifecycle refusal (bin/fm-gate-refuse-lib.sh) and the
# HEAD-continuity guard; see docs/architecture.md "No-mistakes gate authority boundary."
disable_project_settings: true

# Pin lint to the same deterministic command CI runs, instead of leaving it to
# no-mistakes' default handling. Without a configured commands.lint, the gate's
# lint step never ran the deterministic
# `shellcheck bin/*.sh bin/backends/*.sh tests/*.sh` that CI runs, so info-level
# ShellCheck findings (e.g. SC2015) were not surfaced locally before CI rejected
# them. commands.lint delegates to bin/fm-lint.sh, the single owner of the lint
# definition that .github/workflows/ci.yml also invokes, so local can never
# diverge from CI again (parity asserted by tests/fm-lint.test.sh).
#
# Do not set commands.test to a complete tests/*.test.sh walk. Local no-mistakes
# Test is intent-targeted validation of whether the change meets its brief;
# .github/workflows/ci.yml owns broad regression (behavior suite, platform,
# security, Herdr, tmux, and lifecycle coverage). A full-suite override here
# would duplicate CI and defeat the targeted Test contract.
#
# Fork note (native-Windows layer): this fork previously carried a batch/sh
# polyglot override here so a Windows `cmd` invocation of the gate would pin Git
# Bash off git's own install location instead of PATH/WSL bash. That override is
# dropped in favor of upstream's intent-targeted contract above. The Windows lane
# is unaffected: it stays owned by .github/workflows/ci.yml's Git Bash job, which
# runs bin/fm-test-runner-windows.sh (the same Git-Bash-pinning behavior). Do not
# reintroduce an override here - tests/fm-nm-test-contract.test.sh enforces it.
commands:
  lint: 'bin/fm-lint.sh'

# Keep test evidence out of this repo; it stays in a temp dir instead.
test:
  evidence:
    store_in_repo: false
